name: "💡 Feature Request"
description: Suggest an idea or improvement for the open-source bot
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please check the
        [Roadmap](../../README.md#roadmap) first — your idea may already be planned.
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight checklist
      options:
        - label: I searched existing issues and this has not been requested.
          required: true
        - label: This relates to the open-source bot (not a hosted platform product).
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the problem or use case, not just the solution.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that helps us understand the request.
